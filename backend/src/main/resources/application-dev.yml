spring:
  application:
    name: protys-ws-dev

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/protys_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL95Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: true
    open-in-view: false

  # Fuseki Configuration
  fuseki:
    url: http://localhost:3030
    dataset-name: protys
    username: admin
    password: admin-password

  # Jackson Configuration
  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Multipart Configuration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Web Configuration
  web:
    cors:
      allowed-origins: "*"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
      allowed-headers: "*"
      allow-credentials: false
      max-age: 3600

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-stacktrace: on_param

# Logging Configuration
logging:
  level:
    root: INFO
    ve.edu.uc.protys: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/protys-dev.log
    max-size: 10MB
    max-history: 10

# Application Configuration
app:
  name: PROTYS-WS
  version: 1.0.0
  description: Semantic Web Application for ERP Integration
  security:
    jwt:
      secret: dev-secret-key-change-in-production-12345678901234567890
      expiration: 86400000 # 24 hours
      refresh-expiration: 604800000 # 7 days
  cors:
    enabled: true
    allowed-origins: http://localhost:3000,http://localhost:8000
  file-upload:
    max-size: 100MB
    allowed-types: .owl,.rdf,.ttl,.n3
    storage-path: /tmp/protys-uploads

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Development Tools
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
